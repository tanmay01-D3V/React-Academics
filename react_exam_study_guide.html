    intro: `React is a JavaScript library developed by Facebook (Meta) in 2011 and open-sourced in 2013. It was created by Jordan Walke and introduced at JSConf US 2013. React revolutionized frontend development by introducing a component-based architecture and a Virtual DOM for efficient UI updates.\n\nReact's core philosophy: UI is a function of state — <code>UI = f(state)</code>. When state changes, React efficiently re-renders only what needs to change.`,

npm install

npx create-react-app my-app
cd my-app
npm start

import React from 'react';

    interview: [
      { q: "What is the Virtual DOM and how does it work?", a: "The Virtual DOM is a lightweight in-memory representation of the real DOM. When state/props change, React creates a new virtual DOM tree, diffs it against the previous one (reconciliation), and applies only the minimal set of real DOM updates needed. This batching of updates makes React fast." },
      { q: "What is the difference between React and ReactDOM?", a: "React is the core library that defines components, hooks, and the virtual DOM logic. ReactDOM is the renderer that translates React's virtual elements into actual browser DOM nodes. This separation allows React's core to be used with other renderers like React Native (mobile) or React Three Fiber (3D)." },
      { q: "Why was React created? What problem does it solve?", a: "Facebook built React to manage complex, dynamic UIs at scale. Traditional MVC approaches required manual DOM manipulation which became error-prone as state complexity grew. React's declarative model means you describe what the UI should look like for any given state, and React handles all the DOM updates automatically." },
      { q: "What are the key features of React 18?", a: "React 18 introduced: automatic batching (state updates in async code are now batched), concurrent rendering with Concurrent Mode, new hooks like useTransition and useDeferredValue for prioritizing UI updates, and the new createRoot API replacing ReactDOM.render." }

  {

    intro: `React is written with modern JavaScript. Understanding ES6+ features is essential because React code heavily uses them. These features make code more concise, readable, and powerful. Exam questions often test whether you understand these JS fundamentals in a React context.`,

const greet = (name) => \`Hello, \${name}!\`;
const double = x => x * 2;

const { name, age, city = 'Mumbai' } = user; // default value

const newState = { ...oldState, count: oldState.count + 1 };

const doubled = [1,2,3].map(n => n * 2);
const evens = [1,2,3,4].filter(n => n % 2 === 0);
const sum = [1,2,3].reduce((acc, n) => acc + n, 0);

// Promises & async/await
const fetchData = async () => {

    const res = await fetch('/api/data');
    const data = await res.json();
    return data;
  } catch (err) {
    console.error(err);
  }

    interview: [
      { q: "Why do we use spread operator for state updates in React?", a: "React state updates must be immutable — you cannot mutate state directly. The spread operator creates a shallow copy of an object/array and lets you override specific properties. This is how you create a new state object rather than mutating the existing one, which is required for React to detect the change and re-render." },
      { q: "What is the difference between 'var', 'let', and 'const' in ES6?", a: "var is function-scoped and hoisted (often causes bugs). let is block-scoped and reassignable. const is block-scoped and cannot be reassigned (though objects/arrays can still be mutated). In React, prefer const for components and variables, let only when reassignment is needed." },
      { q: "Explain the difference between default and named exports.", a: "A module can have one default export and multiple named exports. Default exports are imported without curly braces and can be renamed freely. Named exports must be imported with curly braces using their exact name (or aliased with 'as'). React components typically use default exports; utility functions use named exports." },
    ],

  {

    intro: `React components are the building blocks of any React application. A functional component is a plain JavaScript function that accepts props as arguments and returns JSX (React elements). Since React 16.8 introduced Hooks, functional components can manage state and side effects — making class components largely obsolete.`,

      "A functional component is just a JS function that returns JSX",

      "Components must return a single root element — use a Fragment (<>) to wrap multiple elements",

      "React re-renders a component whenever its state or props change",
      "Pure components: given same props, always return same output (no side effects in render)"
    ],
    code: `// Basic functional component
function Welcome() {
  return <h1>Hello, World!</h1>;
}

// Arrow function component (same thing)
const Welcome = () => <h1>Hello, World!</h1>;

// Component with props
function Greeting({ name, age }) {
  return (
    <div>
      <h2>Hello, {name}!</h2>

// Fragment — returns multiple elements without extra DOM node

// Composing components (nesting)

    <div className="app">

// Component returning a list

      ))}
    </ul>

export default App;`,
    interview: [
      { q: "Why must React component names start with a capital letter?", a: "JSX uses the capitalization to distinguish between HTML elements and React components. Lowercase tags like <div> are treated as HTML elements. Capitalized tags like <MyComponent> are treated as React components and React looks them up in scope. Without the capital letter, React would try to render a DOM element called 'myComponent' which doesn't exist." },
      { q: "What is the difference between a functional component and a class component?", a: "Functional components are plain JS functions, simpler to write, and use hooks for state/lifecycle. Class components extend React.Component, use this.state, and have lifecycle methods like componentDidMount. Since React 16.8, functional components can do everything class components can. Functional components are now the standard and preferred approach." },
      { q: "Why do we need a 'key' prop when rendering lists?", a: "The key prop helps React identify which items in a list have changed, been added, or removed. React uses keys during reconciliation to efficiently update only the changed items rather than re-rendering the whole list. Keys must be unique among siblings. Avoid using array indices as keys if the list can be reordered, as this can cause bugs." },
    ],
    tip: "Always return JSX wrapped in a single root element. If you have no semantic wrapper to use, use React.Fragment or the shorthand <>...</> syntax.",
    warn: "Never use array index as 'key' in dynamic lists (deletable/sortable). Always use a unique ID from your data.",
  },
  {
    id: 4, category: "Components", title: "Props & PropTypes", sub: "Passing and validating props",
    intro: `Props (properties) are how React components communicate. A parent passes data down to a child component via props. Props are read-only — a component must never modify its own props. This is fundamental to React's unidirectional data flow. PropTypes is a runtime type-checking library that helps validate props in development.`,

      "Children prop: special prop containing everything between component opening/closing tags"

    code: `import PropTypes from 'prop-types'; // npm install prop-types

// PropTypes definition

  email: PropTypes.string.isRequired,
  isAdmin: PropTypes.bool,

UserCard.defaultProps = {
  isAdmin: false,

// Children prop — content between tags

    <div className="card">

    interview: [
      { q: "What is prop drilling and why is it a problem?", a: "Prop drilling is when you pass props through many intermediate components that don't use them, just to get data to a deeply nested child. It's a problem because it makes components tightly coupled, harder to refactor, and creates unnecessary re-renders. Solutions include Context API, Redux, or component composition." },
      { q: "Can you modify props inside a component? Why or why not?", a: "No. Props are immutable from a component's perspective. React enforces this as a principle — components must be pure functions with respect to their props. Modifying props would break React's unidirectional data flow and make state changes unpredictable. If you need to change something, use local state (useState) instead." },
      { q: "What is the 'children' prop?", a: "The children prop is a special built-in prop that contains everything placed between a component's opening and closing tags in JSX. It can be any valid React node: strings, elements, arrays, or even functions. It enables powerful composition patterns like wrapper/layout components." },
    ],
    tip: "PropTypes only run in development (process.env.NODE_ENV !== 'production'). For production type safety, use TypeScript with typed props interfaces instead.",
  },
  {
    id: 5, category: "JSX", title: "JSX Basics", sub: "Overview of JSX, creating elements",
    intro: `JSX (JavaScript XML) is a syntax extension to JavaScript that lets you write HTML-like code inside JavaScript files. It is NOT HTML — it gets compiled by Babel into React.createElement() calls. Understanding this transformation is key to understanding React's rendering model.`,
    keyPoints: [
      "JSX compiles to React.createElement(type, props, ...children) calls",
      "class becomes className, for becomes htmlFor (JS reserved words)",
      "All tags must be closed: <img /> not <img>, <br /> not <br>",
      "JSX expressions use {} for JS values: {name}, {2 + 2}, {isLoggedIn ? 'Yes' : 'No'}",
      "JSX is an expression — it can be stored in variables, returned from functions",
      "Inline styles use camelCase and an object: style={{ backgroundColor: 'red' }}"
    ],
    code: `// JSX compiles to this ↓

// JSX expressions with {}

const element = <h1>Hello, {name}!</h1>;        // Variables
const result = <p>{2 + 2}</p>;                   // Expressions
const upper = <p>{name.toUpperCase()}</p>;        // Method calls

// Conditional in JSX
const isLoggedIn = true;
return (
  <div>
    {isLoggedIn ? <p>Welcome back!</p> : <p>Please log in</p>}

);

// JSX attribute differences from HTML
<div className="box" htmlFor="email">     {/* class → className */}
<input type="text" tabIndex="1" />        {/* camelCase attrs */}
<img src={logo} alt="Logo" />             {/* dynamic value */}

// Inline styles — double curly braces
<div style={{ color: 'blue', fontSize: '16px', marginTop: '10px' }}>
  Styled text
</div>

  <div className="card">
    <h2>Title</h2>

  </div>

// JSX in variables

return <div>{button}</div>;`,
    interview: [
      { q: "What does JSX compile to?", a: "JSX compiles to React.createElement(type, props, ...children) calls via Babel. For example, <Button color='blue'>Click</Button> becomes React.createElement(Button, {color: 'blue'}, 'Click'). This is why React had to be imported in every file in older versions (before React 17's new JSX transform)." },
      { q: "Why do we use className instead of class in JSX?", a: "Because JSX is transpiled to JavaScript, and 'class' is a reserved keyword in JavaScript (used for ES6 classes). Similarly 'for' is reserved so we use 'htmlFor'. React chose to use camelCase attribute names that match the DOM JavaScript API (element.className, element.htmlFor) rather than the HTML attribute names." },
      { q: "What is the difference between {} and {{}} in JSX?", a: "Single {} is the JSX expression delimiter — everything inside is evaluated as JavaScript. Double {{}} means an object literal inside a JSX expression. For example, style={{color: 'red'}} — the outer {} says 'JS expression goes here', and the inner {} is the actual JavaScript object for the style." },
    ],
    tip: "Remember: JSX is syntactic sugar. When debugging, think about what the equivalent React.createElement call would look like.",
  },
  {
    id: 6, category: "JSX", title: "Conditional Rendering", sub: "Creating dynamic UIs with JSX",
    intro: `Conditional rendering in React means rendering different UI based on state or props. React uses standard JavaScript patterns for conditionals — there's no special directive (no ng-if or v-if). This keeps React's templating close to pure JavaScript.`,
    keyPoints: [
      "Ternary operator: condition ? <A /> : <B /> — renders one of two elements",
      "Short-circuit &&: condition && <Element /> — renders element or nothing",
      "null/undefined/false: returning these renders nothing (no DOM node)",
      "if/else before the return — cleanest for complex conditions",
      "Switch statements useful for multiple condition branches",
      "Avoid returning 0 with && — 0 is falsy but renders as the number '0' in DOM"
    ],
    code: `// Ternary — either/or

      {isLoggedIn ? (
        <button>Logout</button>
      ) : (
        <button>Login</button>

    interview: [
      { q: "What are the different ways to do conditional rendering in React?", a: "1) Ternary operator (condition ? A : B) for either/or, 2) Short-circuit && for show/hide, 3) if/else before the return statement, 4) Switch statements for multiple cases, 5) Returning null to render nothing, 6) Immediately invoked functions for complex logic inside JSX. The choice depends on complexity — simple cases use ternary or &&, complex logic uses if/else before return." },

function ProtectedRoute({ children }) {
  const { isAuthenticated } = useAuth();
  const location = useLocation();

  if (!isAuthenticated) {
    // Redirect to login, save current location to redirect back after login
    return <Navigate to="/login" state={{ from: location }} replace />;
  }

  return children;
}

  const { isAuthenticated, user } = useAuth();

  });
  document.querySelectorAll('.category-group').forEach(group => {
    const visible = [...group.querySelectorAll('.topic-item')].some(el => el.style.display !== 'none');
    group.style.display = visible ? '' : 'none';
  });
}

function renderSidebar() {
  const container = document.getElementById('topic-list');
  container.innerHTML = categories.map(cat => {
    const catTopics = topics.filter(t => t.category === cat);
    return `<div class="category-group">
      <div class="category-label">${cat}</div>
      ${catTopics.map(t => `
        <div class="topic-item ${t.id === activeId ? 'active' : ''}" onclick="selectTopic(${t.id})">
          <span class="topic-num">${t.id}</span>
          <span>${t.title}</span>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

function renderTabs() {
  const tabs = ['notes', 'code', 'interview'];
  return tabs.map(t => `
    <div class="tab ${t === activeTab ? 'active' : ''}" onclick="selectTab('${t}')">
      ${t === 'notes' ? 'Notes' : t === 'code' ? 'Code Examples' : 'Interview Q&A'}
    </div>
  `).join('');
}

function renderContent() {
  const topic = topics.find(t => t.id === activeId);
  const total = topics.length;
  const pct = Math.round((activeId / total) * 100);

  let tabContent = '';
  if (activeTab === 'notes') {
    tabContent = `
      <div class="section">
        <div class="section-title"><i class="ti ti-book-open" aria-hidden="true"></i> Introduction</div>
        <div class="prose">${topic.intro.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</div>
      </div>
      <div class="section">
        <div class="section-title"><i class="ti ti-list-check" aria-hidden="true"></i> Key Points</div>
        <div class="key-points">
          ${topic.keyPoints.map(p => `<div class="key-point"><div class="key-point-dot"></div><span>${p}</span></div>`).join('')}
        </div>
      </div>
      ${topic.tip ? `<div class="tip-box"><i class="ti ti-bulb" aria-hidden="true"></i><span><strong>Exam tip:</strong> ${topic.tip}</span></div>` : ''}
      ${topic.warn ? `<div class="warn-box" style="margin-top:12px"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span><strong>Watch out:</strong> ${topic.warn}</span></div>` : ''}
    `;
  } else if (activeTab === 'code') {
    tabContent = `
      <div class="section">
        <div class="code-label">Example Code</div>
        <pre>${escapeHtml(topic.code)}</pre>
      </div>
    `;
  } else {
    tabContent = `
      <div class="section">
        <div class="section-title"><i class="ti ti-message-question" aria-hidden="true"></i> Interview Questions</div>
        ${topic.interview.map((item, i) => `
          <div class="interview-q">
            <div class="interview-q-header" onclick="toggleQ(${topic.id}, ${i})">
              <span>${item.q}</span>
              <i class="ti ti-chevron-down" aria-hidden="true" style="font-size:16px;color:var(--color-text-tertiary);transition:transform 0.2s;${openQuestions[topic.id+'_'+i] ? 'transform:rotate(180deg)' : ''}"></i>
            </div>
            <div class="interview-q-body ${openQuestions[topic.id+'_'+i] ? 'open' : ''}">${item.a}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  const prev = activeId > 1;
  const next = activeId < total;

  document.getElementById('main-content').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="topic-header">
      <div class="topic-badge"><i class="ti ti-atom" aria-hidden="true" style="font-size:13px"></i> Topic ${activeId} of ${total}</div>
      <div class="topic-title">${topic.title}</div>
      <div class="topic-subtitle">${topic.sub}</div>
    </div>
    <div class="tabs">${renderTabs()}</div>
    <div class="content">${tabContent}</div>
    <div class="nav-footer">
      <button class="nav-btn" onclick="navigate(-1)" ${!prev ? 'disabled style="opacity:0.4"' : ''}>← Previous</button>
      <span style="font-size:13px;color:var(--color-text-tertiary)">${pct}% complete</span>
      <button class="nav-btn primary" onclick="navigate(1)" ${!next ? 'disabled style="opacity:0.4"' : ''}>Next →</button>
    </div>
  `;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectTopic(id) {
  activeId = id;
  activeTab = 'notes';
  renderSidebar();
  renderContent();
  document.getElementById('main-content').scrollTop = 0;
}

function selectTab(tab) {
  activeTab = tab;
  renderContent();
}

function toggleQ(topicId, i) {
  const key = topicId + '_' + i;
  openQuestions[key] = !openQuestions[key];
  renderContent();
}

function navigate(dir) {
  const newId = activeId + dir;
  if (newId >= 1 && newId <= topics.length) selectTopic(newId);
}

renderSidebar();
renderContent();
</script>
